
services:
  nginx:
    image: nginx:latest
    container_name: nginx-compose
    restart: always
    ports:
      - "8082:80"
    volumes:
      - /home/zfc/compose-nginx-html:/usr/share/nginx/html
      - /home/zfc/compose-study/nginx-conf/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - compose-net

  mysql:
    image: mysql/mysql-server:8.0
    container_name: mysql-compose
    restart: always
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: "compose_test"
    volumes:
      - /home/zfc/compose-mysql-data:/var/lib/mysql
    networks:
      - compose-net

  app:
    build: ./app
    container_name: python-app-compose
    restart: always
    ports:
      - "5000:5000"
    networks:
      - compose-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  compose-net:
    driver: bridge
